type Department @model @auth(rules: [{allow: private}])
{
  name: String!
  description: String
  status: String
  createdAt: AWSDateTime
}

type Role @model @auth(rules: [{allow: private}])
{
  name: String!
  description: String
  departmentId: ID
  status: String
  createdAt: AWSDateTime
}

type User @model @auth(rules: [{allow: private}])
{
  firstName: String!
  lastName: String!
  email: AWSEmail!
  employeeId: String!
  departmentId: ID
  roleId: ID
  lineManager: String
  phone: String
  status: String
  createdAt: AWSDateTime
}

type Company @model @auth(rules: [{allow: private}])
{
  name: String!
  industry: String
  status: String
  createdAt: AWSDateTime
}

type Contact @model @auth(rules: [{allow: private}])
{
  firstName: String!
  lastName: String!
  email: AWSEmail!
  phone: String
  companyId: ID
  createdAt: AWSDateTime
}

type Deal @model @auth(rules: [{allow: private}])
{
  dealName: String!
  amount: Float
  stage: String
  companyId: ID
  ownerId: ID
  createdAt: AWSDateTime
}